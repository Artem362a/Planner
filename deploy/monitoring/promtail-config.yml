# Promtail — забирает логи всех docker-контейнеров через docker.sock
# и шлёт в Loki. Из JSON-строк бэкенда достаёт level как метку.
server:
  http_listen_port: 9080

positions:
  filename: /positions/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      # /dayplan-backend → dayplan-backend
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
    pipeline_stages:
      # Не-JSON строки этот stage молча пропускает — метки просто не добавятся.
      - json:
          expressions:
            level: level
      - labels:
          level:
