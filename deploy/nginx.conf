# /etc/nginx/sites-available/planner  (VDS 185.68.21.222)
# Symlink: ln -s /etc/nginx/sites-available/planner /etc/nginx/sites-enabled/planner
#
# Источник истины — этот файл; на сервере лежит его копия.
# Схема: браузер → nginx (этот конфиг) → 127.0.0.1:8080 (frps-туннель) →
# frpc на ноуте → uvicorn в docker. Статика фронта — /var/www/planner,
# кладётся туда деплой-джобом из .github/workflows/deploy.yml.
#
# NOTE: на сервере в sites-enabled ещё включён устаревший сайт `dayplan`
# (root /var/www/dayplan/..., proxy на :8000) — он полностью перекрыт
# редиректом ниже и подлежит удалению.

server {
    if ($host = dailyplannerapp.ru) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name dailyplannerapp.ru www.dailyplannerapp.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dailyplannerapp.ru www.dailyplannerapp.ru;
    ssl_certificate /etc/letsencrypt/live/dailyplannerapp.ru-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dailyplannerapp.ru-0001/privkey.pem;

    root /var/www/planner;
    index index.html;

    location = /legal/feedback-consent.txt {
        return 301 /api/legal/feedback-consent;
    }
    location = /legal/user-agreement.txt {
        return 301 /api/legal/user-agreement;
    }
    location = /legal/personal-data-policy.txt {
        return 301 /api/legal/personal-data-policy;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 30M;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8080/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Service worker — никогда не кешировать, иначе браузер держит старый SW
    location ~* (sw\.js|registerSW\.js|workbox-.+\.js)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # index.html — проверять обновление при каждом запросе
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
