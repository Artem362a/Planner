# /etc/nginx/sites-available/dayplan
# Symlink to sites-enabled: ln -s /etc/nginx/sites-available/dayplan /etc/nginx/sites-enabled/dayplan

server {
    listen 80;
    server_name your-domain.com;

    # Frontend SPA — serve dist/, fall back to index.html for client-side routing
    root /var/www/dayplan/planner/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API — strip /api prefix and proxy to uvicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Uploads — pass through as-is (uvicorn serves /uploads/ directly)
    location /uploads/ {
        proxy_pass http://127.0.0.1:8000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

# After installing certbot run:
#   certbot --nginx -d your-domain.com
# It will add the HTTPS server block automatically.
