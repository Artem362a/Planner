services:
  postgres:
    # 17 to match the version the prod data was born on — a dump from a
    # newer server restored into an older one is not supported.
    image: postgres:17
    container_name: dayplan-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ:-Etc/UTC}
    ports:
      # 127.0.0.1 binding: host-only access for psql/backups; nothing on the
      # LAN should reach the DB directly.
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dayplan-backend
    env_file:
      - planner/backend/.env
    environment:
      # Overrides the .env value so the app talks to the "postgres" service
      # instead of localhost, which inside the container is itself.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # The app stores naive local datetimes; keep container clocks on the
      # server's timezone (set TZ in the root .env, e.g. Europe/Samara).
      TZ: ${TZ:-Etc/UTC}
      # JSON logs so promtail/Loki can parse level and request_id.
      LOG_FORMAT: json
      # Multiprocess mode for prometheus_client: with --workers > 1, each
      # uvicorn worker keeps its own in-memory counters. Without this,
      # Prometheus scrapes whichever worker's connection it gets, sees a
      # non-monotonic counter, and misreads it as a reset — inflating rates
      # (this is what caused the phantom 4xx/5xx spikes on the dashboard).
      # The directory is wiped and recreated by the container's entrypoint
      # on every start (see Dockerfile) — required by prometheus_client so
      # stale files from a previous run don't leak into the aggregate.
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
    ports:
      # 127.0.0.1 binding: only frpc/nginx on this host may reach the API,
      # not the whole LAN.
      - "127.0.0.1:8000:8000"
    volumes:
      - backend_uploads:/app/planner/backend/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dayplan-bot
    command: python /app/planner/bot/bot.py
    env_file:
      - planner/backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      TZ: ${TZ:-Etc/UTC}
    # NOTE on the Telegram proxy: xray runs on the host and listens on
    # 127.0.0.1 only, which is unreachable from a bridge-network container.
    # On the prod laptop a docker-compose.override.yml (not in git) puts this
    # service on `network_mode: host` so TELEGRAM_PROXY=socks5h://127.0.0.1:...
    # keeps working unchanged; the override also repoints DATABASE_URL at the
    # published 127.0.0.1 postgres port, since `postgres:` doesn't resolve on
    # the host network.
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Observability (всё локально на ноуте, наружу — только Grafana через FRP) ──

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: dayplan-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - backend
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: dayplan-node-exporter
    pid: host
    command:
      - --path.rootfs=/rootfs
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
    volumes:
      - /:/rootfs:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.0
    container_name: dayplan-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      TZ: ${TZ:-Etc/UTC}
    volumes:
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      # 127.0.0.1: доступ снаружи — через FRP-проброс, не напрямую из LAN.
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:3.5.0
    container_name: dayplan-loki
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./deploy/monitoring/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.5.0
    container_name: dayplan-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./deploy/monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/positions
    depends_on:
      - loki
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: dayplan-alertmanager
    # Alertmanager не умеет env-переменные в конфиге, поэтому конфиг
    # генерируется на старте из окружения (токен бота — из backend/.env).
    # Без TELEGRAM_BOT_TOKEN + TELEGRAM_ALERT_CHAT_ID алерты просто не шлются
    # (blackhole) — стек при этом поднимается и работает.
    # NOTE прод: Telegram из RU заблокирован — нужен TELEGRAM_PROXY. xray
    # слушает 127.0.0.1 хоста, из bridge-контейнера он недоступен: на ноуте
    # docker-compose.override.yml переводит этот сервис на network_mode: host
    # (как у бота); тогда prometheus достучится до алертменеджера через
    # 127.0.0.1:9093 хоста — см. deploy-заметки в docs/RUNBOOK.md.
    env_file:
      - planner/backend/.env
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        CFG=/tmp/alertmanager.yml
        if [ -n "$${TELEGRAM_BOT_TOKEN:-}" ] && [ -n "$${TELEGRAM_ALERT_CHAT_ID:-}" ]; then
          {
            echo 'route:'
            echo '  receiver: telegram'
            echo '  group_by: [alertname]'
            echo '  group_wait: 30s'
            echo '  group_interval: 5m'
            echo '  repeat_interval: 4h'
            echo 'receivers:'
            echo '  - name: telegram'
            echo '    telegram_configs:'
            echo "      - bot_token: $${TELEGRAM_BOT_TOKEN}"
            echo "        chat_id: $${TELEGRAM_ALERT_CHAT_ID}"
            echo '        parse_mode: HTML'
          } > "$$CFG"
          if [ -n "$${TELEGRAM_PROXY:-}" ]; then
            # alertmanager принимает только схему socks5:// (не socks5h),
            # при этом Go резолвит DNS через прокси в обоих случаях.
            PROXY=$$(echo "$$TELEGRAM_PROXY" | sed 's|^socks5h://|socks5://|')
            echo '        http_config:' >> "$$CFG"
            echo "          proxy_url: $$PROXY" >> "$$CFG"
          fi
        else
          {
            echo 'route:'
            echo '  receiver: blackhole'
            echo 'receivers:'
            echo '  - name: blackhole'
          } > "$$CFG"
        fi
        exec /bin/alertmanager --config.file="$$CFG" --storage.path=/alertmanager
    volumes:
      - alertmanager_data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:
  prometheus_data:
  grafana_data:
  loki_data:
  promtail_positions:
  alertmanager_data:
