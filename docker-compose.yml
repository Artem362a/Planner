services:
  postgres:
    image: postgres:16
    container_name: dayplan-postgres
    environment:
      POSTGRES_USER: dayplan_user
      POSTGRES_PASSWORD: dayplan_pass
      POSTGRES_DB: dayplan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
